<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Novelist</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="https://picsum.photos/180/180" />
    <script>
      // Early error handler to catch script loading errors or early crashes
      window.onerror = function(message, source, lineno, colno, error) {
        var errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.height = '100%';
        errorDiv.style.backgroundColor = 'white';
        errorDiv.style.color = 'black';
        errorDiv.style.padding = '20px';
        errorDiv.style.zIndex = '9999';
        errorDiv.style.overflow = 'auto';
        errorDiv.innerHTML = '<h1>App Load Error</h1>' +
          '<p><strong>Message:</strong> ' + message + '</p>' +
          '<p><strong>Source:</strong> ' + source + ':' + lineno + ':' + colno + '</p>' +
          '<pre style="background: #eee; padding: 10px; font-size: 12px;">' + (error && error.stack ? error.stack : 'No stack trace') + '</pre>' +
          '<button onclick="location.reload()" style="padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; margin-top: 10px;">Reload App</button>';
        document.body.appendChild(errorDiv);
        return false;
      };
      
      // Catch unhandled promise rejections
      window.onunhandledrejection = function(event) {
        console.error('Unhandled rejection:', event.reason);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
